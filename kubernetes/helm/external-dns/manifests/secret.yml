apiVersion: v1
kind: Secret
metadata:
  name: external-dns-azure
  namespace: kube-system
type: Opaque
stringData:
  azure.json: |
    {
      "tenantId": "REPLACE_AZURE_TENANT_ID",
      "subscriptionId": "REPLACE_AZURE_SUBSCRIPTION_ID",
      "resourceGroup": "REPLACE_AZURE_RESOURCE_GROUP",
      "useWorkloadIdentityExtension": true
    }

# This is a Kubernetes Secret manifest for storing Azure credentials needed by the External DNS application.
# The secret is named "external-dns-azure" and is created in the "kube-system" namespace.
# The type of the secret is "Opaque", which means it can contain arbitrary data.
# The stringData field contains a JSON string with the Azure configuration needed for authentication
# and authorization when interacting with Azure DNS services.
# The JSON includes the tenantId, subscriptionId, resourceGroup, and a flag indicating that the workload
# identity extension should be used for authentication. The values for tenantId, subscriptionId, and
# resourceGroup should be replaced with the actual values for the Azure environment where the External
# DNS application will be managing DNS records. This secret will be mounted as a volume in the External
# DNS pods, allowing the application to access the necessary credentials for managing DNS records in Azure.
